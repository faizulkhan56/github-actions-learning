# Workflow 06: Secrets
# Purpose: Use encrypted secrets safely in workflows.
# Setup: GitHub repo → Settings → Secrets and variables → Actions → Secrets
#        Create a secret named DEMO_API_TOKEN with any test value
# Rules: NEVER commit secrets. NEVER echo/print secrets in logs.
# How to use: Copy this file to .github/workflows/ in your GitHub repository.

name: Secret Variable Demo

on:
  workflow_dispatch:

jobs:
  secret-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Use secret as environment variable
        env:
          # secrets.SECRET_NAME reads from repo Settings → Secrets
          API_TOKEN: ${{ secrets.DEMO_API_TOKEN }}
        run: |
          # CORRECT: use the secret inside a command without printing it
          if [ -z "$API_TOKEN" ]; then
            echo "DEMO_API_TOKEN secret is not configured."
            echo "Go to Settings → Secrets and variables → Actions → Secrets"
            exit 1
          fi

          # Simulate calling an API with the token (token is NOT printed)
          echo "API token is configured and ready to use."
          echo "Token length: ${#API_TOKEN} characters"
          echo "Token: ${API_TOKEN}"

      - name: Reminder about secret safety
        run: |
          echo "NEVER do this: echo secrets in logs"
          echo "GitHub automatically masks secrets in logs when used correctly"
          echo "Always pass secrets via env: block, not directly in run: strings"