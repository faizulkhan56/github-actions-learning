name: Matrix Build Demo

on:
  workflow_dispatch:

jobs:
  matrix-test:
    runs-on: ${{ matrix.os }}

    strategy:
      # Continue running other jobs even if one fails
      fail-fast: false

      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create a simple test script
        run: |
          echo "print('Hello from Python ${{ matrix.python-version }} on ${{ matrix.os }}')" > hello.py

      - name: Run the script
        run: python hello.py

      - name: Verify Python version
        run: |
          python --version
          echo "Matrix job for Python ${{ matrix.python-version }} on ${{ matrix.os }} completed."