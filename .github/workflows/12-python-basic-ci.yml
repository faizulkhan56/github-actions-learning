name: Python Basic CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create sample Python app and test (for demo)
        run: |
          mkdir -p app tests
          touch app/__init__.py
          cat > app/math_utils.py << 'EOF'
          def add(a, b):
              return a + b

          def subtract(a, b):
              return a - b
          EOF
          cat > tests/test_math_utils.py << 'EOF'
          from app.math_utils import add, subtract

          def test_add():
              assert add(2, 3) == 5

          def test_subtract():
              assert subtract(5, 3) == 2
          EOF
          cat > requirements.txt << 'EOF'
          pytest==8.0.0
          EOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: pytest tests/ -v