name: EC2 Docker Deploy Basic

on:
  push:
    branches:
      - main
env:
  IMAGE_NAME: student-demo-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create sample app and Dockerfile (for demo)
        run: |
          cat > Dockerfile << 'EOF'
          FROM python:3.11-slim
          WORKDIR /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY app.py .
          EXPOSE 8000
          CMD ["python", "app.py"]
          EOF
          cat > requirements.txt << 'EOF'
          flask==3.0.0
          EOF
          cat > app.py << 'EOF'
          from flask import Flask
          app = Flask(__name__)

          @app.route("/")
          def hello():
              return "Hello from EC2 Docker Deploy2!"

          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=8000)
          EOF

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag || 'latest' }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Pulling latest Docker image ==="
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo "=== Stopping old container (if running) ==="
            docker stop student-demo-app || true
            docker rm student-demo-app || true

            echo "=== Starting new container ==="
            docker run -d \
              --name student-demo-app \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo "=== Verifying container is running ==="
            docker ps | grep student-demo-app
            sleep 3
            curl -f http://localhost:8000 && echo "App is healthy!" || echo "App not responding yet"

      - name: Deployment summary
        run: |
          echo "Deployment complete!"
          echo "Verify in browser: http://${{ secrets.EC2_HOST }}:8000"
          echo "Or run: curl http://${{ secrets.EC2_HOST }}:8000"